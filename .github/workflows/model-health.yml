name: Model Health Check

on:
  push:
    paths:
      - 'checkpoints/**'
      - 'models/**'
  pull_request:
    paths:
      - 'checkpoints/**'
      - 'models/**'
  workflow_dispatch:
    inputs:
      model-path:
        description: 'Path to model checkpoint'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install model-clinic
        run: pip install model-clinic

      - name: Run model health check
        run: |
          MODEL_PATH="${{ github.event.inputs.model-path || 'checkpoints/model.pt' }}"
          echo "Checking: $MODEL_PATH"
          model-clinic exam "$MODEL_PATH" --json
